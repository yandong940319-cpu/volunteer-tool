<script>

let rows = [];
for (const tag of ['chong','wen','bao']){

    rows.push({...d, tag});
  }
}

let currentTab = 'all';
let searchTerm = '';
let provinceFilter = '';
let planFilter = 0;
let sortKey = 'zyzzdfwc1';
let sortDir = 1;

const provinceSet = [...new Set(rows.map(r=>r.ssmc))].sort();

  const opt = document.createElement('option');
  opt.value = p; opt.textContent = p;

}

document.getElementById('cnt-bao').textContent = VOLUNTEER_DATA.bao.length;
document.getElementById('cnt-all').textContent = rows.length;

function render(){
  let filtered = rows.filter(r=>{
    if (currentTab !== 'all' && r.tag !== currentTab) return false;
    if (provinceFilter && r.ssmc !== provinceFilter) return false;
    if (planFilter && parseInt(r.zyzlqrs1||0) < planFilter) return false;
    if (searchTerm){
      const hay = (r.yxmc + r.zymc + r.ssmc).toLowerCase();
      if (!hay.includes(searchTerm.toLowerCase())) return false;
    }
    return true;
  });

  filtered.sort((a,b)=>{
    let av = a[sortKey], bv = b[sortKey];
    if (sortKey==='zyzzdf1' || sortKey==='zyzzdfwc1' || sortKey==='zyzlqrs1'){
      av = parseFloat(av)||0; bv = parseFloat(bv)||0;
    }
    if (av < bv) return -1*sortDir;
    if (av > bv) return 1*sortDir;
    return 0;
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.getElementById('emptyHint').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('resultcount').textContent = `当前显示 ${filtered.length} 条`;

  const labelMap = {chong:'冲', wen:'稳', bao:'保'};
  for (const r of filtered){
    const tr = document.createElement('tr');

      <td>${r.ssmc}</td>
      <td>${r.zymc}</td>

  });
});
